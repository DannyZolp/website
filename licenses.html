<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Licenses</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,200&display=swap");
      body {
        background: linear-gradient(270deg, #00d0ff, #d000ff);
        background-size: 400% 400%;

        -webkit-animation: Background 30s ease infinite;
        -moz-animation: Background 30s ease infinite;
        animation: Background 30s ease infinite;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      h1 {
        font-size: 3rem;
        font-family: "Poppins", sans-serif;
        color: white;
      }

      ul {
        list-style-type: none;
        text-align: center;
      }

      @-webkit-keyframes Background {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @-moz-keyframes Background {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes Background {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body>
    <ul>
      <li>
        <h1>Licenses</h1>
      </li>
      <li>
        <h1>
          Icons licensed under
          <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank"
            >CC BY 4.0</a
          >
          by
          <a href="https://fontawesome.com/" target="_blank">Font Awesome</a>
        </h1>
      </li>
      <li>
        <h1>
          Open Sans licensed under
          <a href="Open Sans License.txt" target="_blank">Apache License 2.0</a>
        </h1>
      </li>
      <li>
        <h1>
          Poppins licensed under
          <a href="Poppins License.txt" target="_blank"
            >SIL Open Font License</a
          >
        </h1>
      </li>
    </ul>
  </body>
</html>
